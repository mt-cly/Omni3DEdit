VERSION_DICT:
  H: 576
  W: 576
  T: 12
  C: 4
  f: 8  
  options:
    chunk_strategy: nearest-gt
    video_save_fps: 30.0
    beta_linear_start: 5e-6
    log_snr_shift: 2.4
    guider_types: 1
    cfg: 2.0
    camera_scale: 2.0
    num_steps: 50
    cfg_min: 1.2
    encoding_t: 1
    decoding_t: 1
    num_inputs: None
    seed: 23


model:
  base_learning_rate: 1.0e-4
  target: seva.model_engine.SevaEngine
  params:
    ucg_rate: 0.2
    
    disable_first_stage_autocast: False
    log_keys:
      - txt
    VERSION_DICT: ${VERSION_DICT}
    loss_weight: 1.0 
    loss_weighting_config:
          target: sgm.modules.diffusionmodules.loss_weighting.EpsWeighting

    # sigma_sampler_config: #  SEVa没用到这个sampler 
    #       target: sgm.modules.diffusionmodules.sigma_sampling.DiscreteSampling
    #       params:
    #         num_idx: 1000

    #         discretization_config:
    #           target: sgm.modules.diffusionmodules.discretizer.LegacyDDPMDiscretization
    

    scheduler_config: # 用于训练学习率
      target: sgm.lr_scheduler.LambdaLinearScheduler
      params:
        warm_up_steps: [200]
        cycle_lengths: [10000000000000]
        f_start: [1.e-6]
        f_max: [1.]
        f_min: [1.]

    denoiser_config: # 用于训练去噪器
      target: sgm.modules.diffusionmodules.denoiser.DiscreteDenoiser
      params:
        num_idx: 1000

        scaling_config:
          target: sgm.modules.diffusionmodules.denoiser_scaling.EpsScaling
        discretization_config:
          target: sgm.modules.diffusionmodules.discretizer.LegacyDDPMDiscretization

    network_config:
      target: sgm.modules.diffusionmodules.openaimodel.UNetModel
      params:
        use_checkpoint: True
        in_channels: 4
        out_channels: 4
        model_channels: 320
        attention_resolutions: [1, 2, 4]
        num_res_blocks: 2
        channel_mult: [1, 2, 4, 4]
        num_head_channels: 64
        num_classes: sequential
        adm_in_channels: 1792
        num_heads: 1
        transformer_depth: 1
        context_dim: 768
        spatial_transformer_attn_type: softmax-xformers

    conditioner_config:
      target: sgm.modules.GeneralConditioner
      params:
        emb_models:
          - is_trainable: False
            input_key: txt
            ucg_rate: 0.1
            legacy_ucg_value: ""
            target: sgm.modules.encoders.modules.FrozenCLIPEmbedder
            params:
              always_return_pooled: True

          - is_trainable: False
            ucg_rate: 0.1
            input_key: original_size_as_tuple
            target: sgm.modules.encoders.modules.ConcatTimestepEmbedderND
            params:
              outdim: 256

          - is_trainable: False
            input_key: crop_coords_top_left
            ucg_rate: 0.1
            target: sgm.modules.encoders.modules.ConcatTimestepEmbedderND
            params:
              outdim: 256

    first_stage_config:
      target: sgm.models.autoencoder.AutoencoderKL
      params:
        ckpt_path: /data/liyi_chen/code/generative-models/sdxl-vae/sdxl_vae.safetensors
        embed_dim: 4
        monitor: val/rec_loss
        ddconfig:
          attn_type: vanilla-xformers
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult: [1, 2, 4, 4]
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
        lossconfig:
          target: torch.nn.Identity

    loss_fn_config: # 用于训练损失函数
      target: sgm.modules.diffusionmodules.loss.StandardDiffusionLoss
      params:
        loss_weighting_config:
          target: sgm.modules.diffusionmodules.loss_weighting.EpsWeighting
        sigma_sampler_config:
          target: sgm.modules.diffusionmodules.sigma_sampling.DiscreteSampling # SEVA好像不是用这个
          params:
            num_idx: 1000

            discretization_config:
              target: sgm.modules.diffusionmodules.discretizer.LegacyDDPMDiscretization

    
    # sampler_config: #  SEVA没用到
    #   target: sgm.modules.diffusionmodules.sampling.EulerEDMSampler
    #   params:
    #     num_steps: 50

    #     discretization_config:
    #       target: sgm.modules.diffusionmodules.discretizer.LegacyDDPMDiscretization

    #     guider_config:
    #       target: sgm.modules.diffusionmodules.guiders.VanillaCFG
    #       params:
    #         scale: 7.5

data:
  target: seva.seva_dataset_online.SEVADataset
  params:
    rank_id: 0
    VERSION_DICT: ${VERSION_DICT}
    port: None
    query_keys: None
    keys: None  
    mask_ratio: 0.5
    online_save: False

  # target:seva.seva_dataset_online.PseudoVideoDataset
