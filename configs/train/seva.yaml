lightning:
  modelcheckpoint:
    params:
      every_n_train_steps: 180
      save_top_k: -1
      filename: "model-{step}"

  callbacks:
    metrics_over_trainsteps_checkpoint:
      params:
        every_n_train_steps: 800

    image_logger:
      target: main.ImageLogger
      params:
        disabled: False
        enable_autocast: True
        batch_frequency: 50
        max_images: 30
        increase_log_steps: True
        log_first_step: False
        log_images_kwargs:
          use_ema_scope: False
          N: 8
          n_rows: 2

  trainer:
    devices: 0,1,2,3,4,5,6
    benchmark: True
    num_sanity_val_steps: 0
    accumulate_grad_batches: 4
    max_epochs: 1000
    precision: bf16-true # 16-mixed #16-mixed
    # strategy: deepspeed_stage_2